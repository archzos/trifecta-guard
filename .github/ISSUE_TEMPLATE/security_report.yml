name: Security report
description: Report a suspected security vulnerability.
title: "[Security]: "
labels: ["security"]
body:
  - type: markdown
    attributes:
      value: |
        Do not disclose exploitable details publicly.
        Follow the private reporting process in SECURITY.md.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: High-level description of the issue.
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Potential impact
      description: What can an attacker do?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction details
      description: Share minimal details here; send full PoC privately.
