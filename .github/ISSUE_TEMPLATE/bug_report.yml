name: Bug report
description: Report a reproducible defect in trifecta-guard.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include concrete reproduction details.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Exact steps, including config/tool chain if relevant.
      placeholder: |
        1. Use policy config ...
        2. Run tool chain ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: e.g. 0.1.0
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Python version, OS, framework (MCP/LangGraph), etc.
